<!DOCTYPE html>
<html>
<head>
  <title>Ransy Weather Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="sky-bg"></div>
<div class="sun"></div>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<div class="wrapper">

  <div class="header">
    <div style="font-size:24px; margin-bottom:8px;">⛅</div>
    <h1>RANSY WEATHER DASHBOARD</h1>
    <div class="subtitle">⛏ ESP32 + DHT11 SENSOR ⛏</div>
  </div>

  <div class="cards-row">
    <div class="mc-card temp-card">
      <span class="card-icon">🌡️</span>
      <div class="card-label">:: TEMPERATURE</div>
      <div class="card-value">28.4°C</div>
    </div>

    <div class="mc-card hum-card">
      <span class="card-icon">💧</span>
      <div class="card-label">:: HUMIDITY</div>
      <div class="card-value">78%</div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="tempChart"></canvas>
  </div>

  <div class="chart-container">
    <canvas id="humChart"></canvas>
  </div>

  <div class="readings-table">
    <table>
      <tbody id="readings-body"></tbody>
    </table>
  </div>

</div>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
