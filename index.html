<!DOCTYPE html>
<html>
<head>
  <title>Ransy Weather Dashboard - Dragon</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="sky-bg"></div>

<!-- STARS -->
<svg class="stars" viewBox="0 0 800 300">
  <!-- (same stars content from original, no changes) -->
</svg>

<div class="sun"></div>
<div class="horizon-glow"></div>

<!-- CLOUDS -->
<!-- (ALL cloud SVGs SAME as original — copy directly here) -->

<!-- DRAGON -->
<div class="dragon-wrap">
  <!-- 🔥 IMPORTANT: COPY FULL DRAGON SVG FROM ORIGINAL HERE -->
</div>

<!-- TERRAIN -->
<!-- (COPY FULL TERRAIN SVG HERE) -->

<div class="wrapper">

  <div class="header">
    <div style="font-size:24px;margin-bottom:8px;">⛅</div>
    <h1>RANSY WEATHER DASHBOARD</h1>
    <div class="subtitle">⛏ ESP32 + DHT11 SENSOR ⛏</div>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-inner">
      <span class="ticker-item">⛏ RANSY WEATHER DASHBOARD · ESP32 + DHT11 · UPDATES EVERY 5 SEC</span>
      <span class="ticker-item">🌡️ TEMP: 28.4°C · 💧 HUMIDITY: 78% · 🐉 ENDER DRAGON SPOTTED</span>
    </div>
  </div>

  <!-- ALERT -->
  <div class="alert-toast" id="alertToast">
    <div class="alert-toast-icon">⚠️</div>
    <div>
      <div class="alert-toast-title">!! HUMIDITY WARNING !!</div>
      <div class="alert-toast-msg">Humidity is high</div>
    </div>
    <div onclick="closeAlert()">[X]</div>
  </div>

  <!-- CARDS -->
  <div class="cards-row">
    <div class="mc-card temp-card">
      <span class="card-icon">🌡️</span>
      <div class="card-value">28.4°C</div>
    </div>

    <div class="mc-card hum-card">
      <span class="card-icon">💧</span>
      <div class="card-value">78%</div>
    </div>
  </div>

  <!-- SUGGESTIONS -->
  <div class="suggest-panel">
    <div id="suggestGrid"></div>
  </div>

  <!-- CHARTS -->
  <canvas id="tempChart"></canvas>
  <canvas id="humChart"></canvas>

  <!-- TABLE -->
  <table>
    <tbody id="readings-body"></tbody>
  </table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="script.js"></script>

</body>
</html>
